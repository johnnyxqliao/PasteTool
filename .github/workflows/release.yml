name: Release

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - "README.md"

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    env:
      PLUGIN_ZIP: Flow.Launcher.Plugin.PasteTool.zip
      MAIN: Flow.Launcher.Plugin.PasteTool.csproj
      HELPER: PasteHelper/PasteHelper.csproj

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            7.0.x

      - name: Read plugin version
        id: version
        shell: pwsh
        run: |
          $json = Get-Content plugin.json -Raw | ConvertFrom-Json
          "version=$($json.Version)" >> $env:GITHUB_OUTPUT

      - name: Restore main plugin
        run: dotnet restore $env:MAIN

      - name: Publish main plugin
        shell: pwsh
        run: |
          dotnet publish $env:MAIN `
            -c Release `
            -r win-x64 `
            --no-self-contained `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o publish

      - name: Build PasteHelper (net48 console exe)
        shell: pwsh
        run: |
          dotnet build $env:HELPER -c Release -p:DebugType=None -p:DebugSymbols=false -o publish-helper

      - name: Stage PasteHelper alongside plugin dll
        shell: pwsh
        run: |
          Copy-Item publish-helper/PasteHelper.exe publish/PasteHelper.exe -Force
          if (Test-Path publish-helper/PasteHelper.exe.config) {
            Copy-Item publish-helper/PasteHelper.exe.config publish/PasteHelper.exe.config -Force
          }

      - name: Generate default icons if missing
        shell: pwsh
        run: |
          $dir = "publish/Images"
          if (-not (Test-Path $dir)) { New-Item -ItemType Directory -Path $dir | Out-Null }
          $bytes = [System.Convert]::FromBase64String("iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO+/p9sAAAAASUVORK5CYII=")
          foreach ($name in @("app.png","text.png","image.png","file.png","copy.png","paste.png")) {
            $p = Join-Path $dir $name
            if (-not (Test-Path $p)) { [IO.File]::WriteAllBytes($p, $bytes) }
          }

      - name: Build plugin zip
        shell: pwsh
        run: |
          if (Test-Path $env:PLUGIN_ZIP) { Remove-Item $env:PLUGIN_ZIP }
          Compress-Archive -Path publish/* -DestinationPath $env:PLUGIN_ZIP

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Flow.Launcher.Plugin.PasteTool
          path: ${{ env.PLUGIN_ZIP }}

      - name: Publish GitHub release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: ${{ env.PLUGIN_ZIP }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
